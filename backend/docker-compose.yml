services:
  api:
    build: .
    ports:
      - "8088:8088"
    env_file:
      - .env.example
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: scwb
      POSTGRES_PASSWORD: scwb
      POSTGRES_DB: scwb
    ports:
      - "5433:5432"
    volumes:
      - scwb_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  scwb_pgdata:
