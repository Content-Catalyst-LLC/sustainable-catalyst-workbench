services:
  - type: web
    name: sustainable-catalyst-workbench-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SC_WORKBENCH_ENVIRONMENT
        value: production
      - key: SC_WORKBENCH_AI_PROVIDER
        value: openai
      - key: SC_WORKBENCH_OPENAI_MODEL
        value: gpt-4.1-mini
      - key: SC_WORKBENCH_MAX_OUTPUT_TOKENS
        value: "1000"
      - key: SC_WORKBENCH_TEMPERATURE
        value: "0.2"
      - key: SC_WORKBENCH_ALLOW_WORDPRESS_PROVIDER_KEY
        value: "true"
      - key: SC_WORKBENCH_SCOPE_GATE
        value: "true"
      - key: SC_WORKBENCH_CORS_ORIGINS
        value: https://sustainablecatalyst.com
      - key: OPENAI_API_KEY
        sync: false
      - key: SC_WORKBENCH_BACKEND_KEY
        sync: false
